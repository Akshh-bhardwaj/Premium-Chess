<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chess</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="layout-container">
        <div class="player-panel white-player">
            <div class="player-info">
                <div class="avatar avatar-white">
                    <img src="{{ url_for('static', filename='img/player_white.png') }}" alt="Player 1" width="100%" height="100%" style="border-radius: 50%; object-fit: cover;">
                </div>
                <h2 contenteditable="true" spellcheck="false" class="editable-name">Player 1</h2>
                <span class="player-color">White</span>
                <div class="chess-clock" id="clock-white">10:00</div>
            </div>
            <div id="cap-white" class="captured-pieces glassy"></div>
            <div class="moves-container">
                <h3>Moves History</h3>
                <ul id="moves-list-white" class="moves-list"></ul>
            </div>
            <div class="chat-container glassy">
                <div class="chat-history" id="chat-history-white"></div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input-white" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage('white', 'chat-input-white')">
                    <button onclick="sendChatMessage('white', 'chat-input-white')">Send</button>
                </div>
                <div class="emoji-bar">
                    <span onclick="insertEmoji('chat-input-white', '😈')">😈</span>
                    <span onclick="insertEmoji('chat-input-white', '🤯')">🤯</span>
                    <span onclick="insertEmoji('chat-input-white', '🤡')">🤡</span>
                    <span onclick="insertEmoji('chat-input-white', '🔥')">🔥</span>
                    <span onclick="insertEmoji('chat-input-white', '😂')">😂</span>
                </div>
            </div>
        </div>

        <div class="game-container">
            <header>
                <div id="status">White's Turn</div>
            </header>

            <div class="board-wrapper">
                <div id="board-container">
                    <div id="board"></div>
                </div>
                <div id="game-over-modal" class="hidden">
                    <div class="modal-content">
                        <h2 id="modal-title">Game Over</h2>
                        <p id="modal-message"></p>
                        <button id="modal-btn">Play Again</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="player-panel black-player">
            <div class="player-info">
                <div class="avatar avatar-black">
                    <img src="{{ url_for('static', filename='img/player_black.png') }}" alt="Player 2" width="100%" height="100%" style="border-radius: 50%; object-fit: cover;">
                </div>
                <h2 contenteditable="true" spellcheck="false" class="editable-name">Player 2</h2>
                <span class="player-color">Black</span>
                <div class="chess-clock" id="clock-black">10:00</div>
            </div>
            <div id="cap-black" class="captured-pieces glassy"></div>
            <div class="moves-container">
                <h3>Moves History</h3>
                <ul id="moves-list-black" class="moves-list"></ul>
            </div>
            <div class="chat-container glassy">
                <div class="chat-history" id="chat-history-black"></div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input-black" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage('black', 'chat-input-black')">
                    <button onclick="sendChatMessage('black', 'chat-input-black')">Send</button>
                </div>
                <div class="emoji-bar">
                    <span onclick="insertEmoji('chat-input-black', '😈')">😈</span>
                    <span onclick="insertEmoji('chat-input-black', '🤯')">🤯</span>
                    <span onclick="insertEmoji('chat-input-black', '🤡')">🤡</span>
                    <span onclick="insertEmoji('chat-input-black', '🔥')">🔥</span>
                    <span onclick="insertEmoji('chat-input-black', '😂')">😂</span>
                </div>
            </div>
        </div>
        <div class="controls-sidebar glassy">
            <h3>Actions</h3>
            <button id="reset-btn">🔄 Reset Game</button>
            <button id="pause-btn" class="hint-button">⏸ Pause Game</button>
            <button id="hint-btn" class="hint-button">💡 Hint</button>
            <button id="devil-btn" class="devil-button">😈 Devil Mode</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
