<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Ludo – Play Now</title>
    <meta name="description" content="Play premium Ludo online — 2 to 4 players, stunning glassmorphism design, animated dice, and real-time gameplay.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ludo.css') }}">
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <a href="/" class="topbar-brand">♟️ Premium Chess</a>
        <div class="topbar-center">
            <span class="topbar-title">🎲 Ludo</span>
        </div>
        <div class="topbar-right">
            <span class="topbar-user">👤 {{ username }}</span>
            <a href="/logout" class="topbar-logout">Logout</a>
        </div>
    </div>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-screen">
        <div class="setup-card">
            <div class="setup-icon">🎲</div>
            <h1 class="setup-title">Ludo Royale</h1>
            <p class="setup-subtitle">Classic board game. Premium experience.</p>

            <div class="player-count-selector">
                <label>Number of Players</label>
                <div class="count-btns">
                    <button class="count-btn active" data-count="2">2</button>
                    <button class="count-btn" data-count="3">3</button>
                    <button class="count-btn" data-count="4">4</button>
                </div>
            </div>

            <div class="player-names-grid" id="player-names-grid">
                <!-- Filled by JS -->
            </div>

            <button id="start-ludo-btn" class="start-ludo-btn">🎲 Start Game</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="game-screen hidden">
        <div class="game-layout">
            <!-- Left Info -->
            <div class="side-panel left-panel">
                <div class="turn-indicator glassy" id="turn-indicator">
                    <div id="turn-color-dot" class="turn-dot"></div>
                    <div>
                        <div id="turn-player-name" class="turn-name">Red's Turn</div>
                        <div class="turn-sub">Roll the dice to move</div>
                    </div>
                </div>

                <div class="dice-area glassy">
                    <div id="dice-face" class="dice" onclick="rollDice()">
                        <div class="dice-pips" id="dice-pips"></div>
                    </div>
                    <button id="roll-btn" class="roll-btn" onclick="rollDice()">🎲 Roll Dice</button>
                    <div id="dice-value" class="dice-value">–</div>
                </div>

                <div class="score-board glassy" id="score-board">
                    <!-- Filled dynamically -->
                </div>
            </div>

            <!-- Board -->
            <div class="board-area">
                <div id="ludo-board" class="ludo-board">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Right Panel -->
            <div class="side-panel right-panel">
                <div class="game-log glassy">
                    <h3>🗒️ Game Log</h3>
                    <ul id="game-log-list"></ul>
                </div>
                <button class="quit-btn" onclick="quitGame()">🚪 Quit Game</button>
            </div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="win-modal hidden">
        <div class="win-content">
            <div class="win-trophy">🏆</div>
            <h2 id="win-title" class="win-title">Red Wins!</h2>
            <p id="win-subtitle" class="win-sub">Congratulations, champion!</p>
            <div class="win-actions">
                <button class="win-btn-play" onclick="location.reload()">🎲 Play Again</button>
                <a href="/" class="win-btn-chess">♟️ Play Chess</a>
            </div>
        </div>
    </div>

    <script>
        window.CURRENT_USER = "{{ username }}";
    </script>
    <script src="{{ url_for('static', filename='js/ludo.js') }}"></script>
</body>
</html>
